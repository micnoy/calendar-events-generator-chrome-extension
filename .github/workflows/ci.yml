name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run check
      - name: Verify manifest.json version matches package.json
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) != package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
