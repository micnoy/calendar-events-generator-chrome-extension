<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Calendar Link Generator</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <h1>Settings</h1>

    <label for="api-key-input">OpenAI API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-..." />
    <p class="hint">
      Your key is stored locally on this device only. It is never sent anywhere except the OpenAI API.
    </p>

    <label for="model-select">Model</label>
    <select id="model-select">
      <option value="gpt-4o-mini">gpt-4o-mini (recommended)</option>
      <option value="gpt-4o">gpt-4o</option>
      <option value="gpt-4.1-nano">gpt-4.1-nano</option>
    </select>

    <label for="default-tz-input">Default Timezone (IANA format)</label>
    <input type="text" id="default-tz-input" placeholder="Asia/Jerusalem" />
    <p class="hint">
      Used when no timezone is mentioned in the date string.
    </p>

    <button id="save-btn">Save Settings</button>
    <div id="status-message" class="status hidden"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
